name: 디자인 검수 완료 배포

# Slack "디자인 검수 완료" 버튼 클릭 시 Cloudflare Worker가
# GitHub repository_dispatch 이벤트를 발송하면 이 워크플로가 실행된다.
on:
  repository_dispatch:
    types: [design-approved]

jobs:
  deploy:
    name: feature 브랜치 직접 빌드·배포
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: 배포 대상 브랜치 확인
        run: |
          BRANCH="${{ github.event.client_payload.branch }}"
          if [ -z "$BRANCH" ]; then
            echo "client_payload.branch 값이 없습니다."
            exit 1
          fi
          echo "배포 대상 브랜치: $BRANCH"

      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.client_payload.branch }}

      - name: pnpm 설정
        uses: pnpm/action-setup@v4

      - name: Node 설정
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: 의존성 설치
        run: pnpm install

      - name: 빌드
        run: pnpm build

      - name: npm 배포
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm release

      - name: 배포 완료 Slack 알림
        if: success()
        run: |
          BRANCH="${{ github.event.client_payload.branch }}"
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"🚀 *배포 완료* — \`$BRANCH\` 브랜치를 기준으로 빌드 및 npm 배포를 마쳤습니다.\"}"

      - name: 실패 시 Slack 알림
        if: failure()
        run: |
          BRANCH="${{ github.event.client_payload.branch }}"
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"❌ *배포 실패* — \`$BRANCH\` 브랜치의 빌드/배포 중 오류가 발생했습니다. GitHub Actions 로그를 확인해주세요.\"}"
