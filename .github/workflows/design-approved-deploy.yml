name: 디자인 검수 완료 배포

# API·Worker에서 workflow_dispatch 할 때:
#   - ref 는 반드시 main (워크플로 정의는 main 기준)
#   - inputs.branch 에 머지할 feature 브랜치명
# 동작: feature에서 changeset version → PR 생성·머지 → 빌드 → npm publish (한 워크플로에서 전부 처리)
# Slack "배포" 버튼 → Cloudflare Worker가 위 규칙으로 호출
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'main에 머지할 브랜치명'
        required: true
        type: string

concurrency:
  group: design-approved-deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    name: 버전 범프 → PR 머지 → npm 배포
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      id-token: write

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      NPM_CONFIG_PROVENANCE: "true"

    steps:
      - name: workflow_dispatch ref 검증
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "::error::이 워크플로는 ref=main 으로만 디스패치해야 합니다. (현재: ${{ github.ref }})"
            exit 1
          fi

      - name: 머지 대상 브랜치 확인
        run: |
          BRANCH="${{ inputs.branch }}"
          if [ -z "$BRANCH" ]; then
            echo "inputs.branch 값이 없습니다."
            exit 1
          fi
          if [ "$BRANCH" = "main" ]; then
            echo "::error::inputs.branch는 main이 아닌 feature 브랜치여야 합니다."
            exit 1
          fi
          echo "머지할 브랜치: $BRANCH"

      - name: feature 브랜치 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.branch }}

      - name: main을 feature 브랜치에 머지 (충돌 방지)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge origin/main -m "Merge main into ${{ inputs.branch }} (디자인 승인 배포 준비)"
          git push origin ${{ inputs.branch }}

      - name: pnpm 설정
        uses: pnpm/action-setup@v4

      - name: Node 설정
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: npm CLI 업그레이드 (Trusted Publishing)
        run: npm i -g npm@^11.5.1

      - name: 의존성 설치
        run: pnpm install

      - name: changeset version (버전 범프 + changeset 소비)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ls .changeset/*.md 1>/dev/null 2>&1; then
            pnpm run version
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit --no-verify -m "ci(changesets): version packages (디자인 승인 배포)"
            git push origin ${{ inputs.branch }}
          else
            echo "소비할 changeset 파일이 없습니다. 버전 범프를 건너뜁니다."
          fi

      - name: 빌드
        run: pnpm build

      - name: PR 생성 및 머지
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FEATURE: ${{ inputs.branch }}
        run: |
          EXISTING_PR=$(gh pr list --head "$FEATURE" --base main --state open --json number -q '.[0].number')
          if [ -n "$EXISTING_PR" ]; then
            echo "기존 PR #$EXISTING_PR 을 머지합니다."
            PR_NUMBER=$EXISTING_PR
          else
            echo "PR을 생성합니다."
            PR_URL=$(gh pr create \
              --head "$FEATURE" \
              --base main \
              --title "chore: $FEATURE 디자인 승인 배포" \
              --body "디자인 검수 완료 후 자동 생성된 PR입니다.")
            PR_NUMBER=$(echo "$PR_URL" | grep -o '[0-9]*$')
          fi
          gh pr merge "$PR_NUMBER" --merge --admin

      - name: 버전 업데이트 + npm 배포
        uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm run release
          commit: "ci(changesets): version packages (디자인 승인 배포)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 배포 완료 Slack 알림
        if: success()
        run: |
          FEATURE="${{ inputs.branch }}"
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"🚀 *배포 완료* — \`$FEATURE\` → \`main\` PR 머지 + npm 배포까지 완료되었습니다.\"}"

      - name: 실패 시 Slack 알림
        if: failure()
        run: |
          FEATURE="${{ inputs.branch }}"
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"❌ *배포 실패* — \`$FEATURE\` → \`main\` 처리 중 오류가 발생했습니다. GitHub Actions 로그를 확인해주세요.\"}"
