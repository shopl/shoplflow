name: Changesets Workflow

# 1) push(main, packages·changeset 변경): 버전/배포(release) — npm Trusted Publisher(OIDC) 사용
# 2) workflow_dispatch(inputs.branch): 디자인 승인 배포 — feature에서 version → PR 머지 → 이후 main push로 1)이 배포
# Slack 배포 버튼 → Worker가 이 워크플로를 dispatch (파일명: changesets-workflow.yml)
on:
  workflow_dispatch:
    inputs:
      branch:
        description: "main에 머지할 브랜치명"
        required: true
        type: string
  push:
    paths:
      - ".changeset/**"
      - "packages/**"
    branches:
      - main

jobs:
  design-approved-merge:
    name: 디자인 승인 — 버전 범프 → PR 머지
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    concurrency:
      group: design-approved-merge-${{ github.repository }}
      cancel-in-progress: false

    permissions:
      contents: write
      pull-requests: write

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - name: workflow_dispatch ref 검증
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "::error::이 워크플로는 ref=main 으로만 디스패치해야 합니다. (현재: ${{ github.ref }})"
            exit 1
          fi

      - name: 머지 대상 브랜치 확인
        run: |
          BRANCH="${{ inputs.branch }}"
          if [ -z "$BRANCH" ]; then
            echo "inputs.branch 값이 없습니다."
            exit 1
          fi
          if [ "$BRANCH" = "main" ]; then
            echo "::error::inputs.branch는 main이 아닌 feature 브랜치여야 합니다."
            exit 1
          fi
          echo "머지할 브랜치: $BRANCH"

      - name: feature 브랜치 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.branch }}

      - name: main을 feature 브랜치에 머지 (충돌 방지)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge origin/main -m "Merge main into ${{ inputs.branch }} (디자인 승인 배포 준비)"
          git push origin ${{ inputs.branch }}

      - name: pnpm 설정
        uses: pnpm/action-setup@v4

      - name: Node 설정
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: 의존성 설치
        run: pnpm install

      - name: changeset version (버전 범프 + changeset 소비)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ls .changeset/*.md 1>/dev/null 2>&1; then
            pnpm run version
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit --no-verify -m "ci(changesets): version packages (디자인 승인 배포)"
            git push origin ${{ inputs.branch }}
          else
            echo "소비할 changeset 파일이 없습니다. 버전 범프를 건너뜁니다."
          fi

      - name: 빌드
        run: pnpm build

      - name: PR 생성 및 머지
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FEATURE: ${{ inputs.branch }}
        run: |
          EXISTING_PR=$(gh pr list --head "$FEATURE" --base main --state open --json number -q '.[0].number')
          if [ -n "$EXISTING_PR" ]; then
            echo "기존 PR #$EXISTING_PR 을 머지합니다."
            PR_NUMBER=$EXISTING_PR
          else
            echo "PR을 생성합니다."
            PR_URL=$(gh pr create \
              --head "$FEATURE" \
              --base main \
              --title "chore: $FEATURE 디자인 승인 배포" \
              --body "디자인 검수 완료 후 자동 생성된 PR입니다.")
            PR_NUMBER=$(echo "$PR_URL" | grep -o '[0-9]*$')
          fi
          gh pr merge "$PR_NUMBER" --merge --admin

      - name: 머지 완료 Slack 알림
        if: success()
        run: |
          FEATURE="${{ inputs.branch }}"
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"✅ *PR 머지 완료* — \`$FEATURE\` → \`main\` 머지가 완료되었습니다. 같은 워크플로의 push 트리거로 npm 배포가 이어집니다.\"}"

      - name: 실패 시 Slack 알림
        if: failure()
        run: |
          FEATURE="${{ inputs.branch }}"
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"❌ *배포 실패* — \`$FEATURE\` → \`main\` 처리 중 오류가 발생했습니다. GitHub Actions 로그를 확인해주세요.\"}"

  release-after-design-approval:
    name: Release (디자인 승인 직후)
    if: github.event_name == 'workflow_dispatch'
    needs: [design-approved-merge]
    runs-on: ubuntu-latest

    concurrency:
      group: changesets-release-dispatch-${{ github.repository }}
      cancel-in-progress: false

    permissions:
      contents: write
      pull-requests: write
      id-token: write

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      NPM_CONFIG_PROVENANCE: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: pnpm을 설정하고 있어요.
        uses: pnpm/action-setup@v4

      - name: 노드를 설정하고 있어요.
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Ensure npm >= 11.5.1 for Trusted Publishing
        run: npm i -g npm@^11.5.1

      - name: Install dependencies
        run: pnpm install

      - name: 패키지를 빌드하고 있어요.
        run: pnpm build

      - name: PR을 생성하거나 NPM에 배포하고 있어요.
        uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm run release
          commit: "ci(changesets): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    concurrency:
      group: changesets-release-${{ github.repository }}
      cancel-in-progress: false

    # ✅ (필수) Trusted Publisher(OIDC) 인증에 필요
    # ✅ changesets/action이 PR/커밋/릴리즈를 만들면 contents/pull-requests 권한도 필요할 수 있음
    permissions:
      contents: write
      pull-requests: write
      id-token: write # ← OIDC 토큰 발급 권한 (Trusted Publisher 핵심)

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      NPM_CONFIG_PROVENANCE: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: pnpm을 설정하고 있어요.
        uses: pnpm/action-setup@v4

      - name: 노드를 설정하고 있어요.
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Ensure npm >= 11.5.1 for Trusted Publishing
        run: npm i -g npm@^11.5.1

      - name: Install dependencies
        run: pnpm install

      - name: 패키지를 빌드하고 있어요.
        run: pnpm build

      - name: PR을 생성하거나 NPM에 배포하고 있어요.
        uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm run release
          commit: "ci(changesets): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
